# Model ids per role — ResearchSwarm.
#
# Asset for ticket #31 (build 04). One id per ROLE, not per beat: the manager
# and the critic are single agents, so their model belongs here.
#
# Why researchers are NOT here: a researcher's model is a PER-BEAT override
# (config/beats.toml → [defaults] model, overridable per [[beat]]), because a
# beat may one day want a heavier model for a harder charter. The manager and
# critic have no per-beat axis — they are one call each — so a per-role id is
# the right home. Keeping the two apart is the whole reason this file exists
# rather than a manager = "..." line bolted onto beats.toml.
#
# The critic is a DIFFERENT model family from the workers on purpose (spec/06):
# Codex, on a ChatGPT subscription, judges what Claude wrote. A cross-family gate
# catches what a same-family critic would share the blind spot on.

[models]
# The v2 aperture fan-out's model. v1 read a researcher's model from beats.toml
# (a per-BEAT override, which is why researchers were not a role here); the pivot
# replaced beats with apertures DERIVED from the program config, so there is no
# beats.toml and no per-aperture axis to override on. That makes the researcher a
# role like the other three, and this is its one home — read by both the fan-out
# and the issue's models block, so the id invoked and the id recorded cannot drift.
researchers = "claude-sonnet-5"
manager = "claude-opus-4-8"
critic = "gpt-5-codex"

# The conference-calendar verifier: a read-only web-fetch task at the researcher
# tier (it fetches a society's own page and reports the dates), so it rides the
# same light model. It IS a role — one call per window each cycle, no per-beat
# axis — so its id lives here, not in beats.toml. Required whenever [surge] is
# enabled: run.py has ONE home for the id (no shadow default), so a missing key
# is a config error, not a silent fallback.
verifier = "sonnet"
